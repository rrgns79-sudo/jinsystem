<!-- Monitoring Card Render -->
<script>
  const DEFAULT_CARDS = [
    { id: 1, name: '제주 버스 GNSS IoT', url: 'http://112.164.247.109/login', icon: 'lan', active: true },
    { id: 2, name: '스마트그린 청소차량', url: 'https://www.jeju.go.kr/is/jsgm/login.do', icon: 'location_city', active: true },
    { id: 3, name: '제주 제설 관제', url: 'http://jejusnow.vireyi.kr:8071', icon: 'ac_unit', active: true },
    { id: 4, name: 'Ultra RTK', url: 'https://jin.ultrartk.com/ultraRtk/login', icon: 'satellite_alt', active: true },
  ];

  function renderMonitoringCards() {
    const saved = localStorage.getItem('jinsystem_cards');
    const cards = saved ? JSON.parse(saved) : DEFAULT_CARDS;
    const grid = document.getElementById('monitoring-grid');

    grid.innerHTML = cards.map(card => `
      <a class="glass-card rounded-xl p-lg shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-300 group flex flex-col h-full ${!card.active ? 'opacity-40 pointer-events-none' : ''}"
         href="${card.url}" target="_blank">
        <div class="flex justify-between items-start mb-lg">
          <div class="w-12 h-12 rounded-full ${card.active ? 'bg-secondary/10 text-secondary group-hover:bg-secondary group-hover:text-white' : 'bg-gray-100 text-gray-400'} flex items-center justify-center transition-colors duration-300">
            <span class="material-symbols-outlined text-[28px]">${card.icon}</span>
          </div>
          <div class="flex items-center gap-xs ${card.active ? 'bg-green-100' : 'bg-gray-100'} px-xs py-[2px] rounded-full">
            <span class="w-2 h-2 ${card.active ? 'bg-green-500' : 'bg-gray-400'} rounded-full"></span>
            <span class="font-label-md text-[10px] ${card.active ? 'text-green-700' : 'text-gray-500'} font-bold uppercase">${card.active ? 'Active' : 'Inactive'}</span>
          </div>
        </div>
        <h3 class="font-headline-md text-[20px] mb-sm ${card.active ? 'group-hover:text-secondary' : ''} transition-colors leading-tight">${card.name}</h3>
        <div class="mt-md flex items-center text-secondary font-label-md ${card.active ? 'opacity-0 group-hover:opacity-100' : 'hidden'} transition-opacity">
          <span>LAUNCH PLATFORM</span>
          <span class="material-symbols-outlined text-sm ml-1">open_in_new</span>
        </div>
      </a>
    `).join('');
  }

  renderMonitoringCards();

  // Footer 렌더링
  const DEFAULT_FOOTER = { year: '2018', address: '제주시 연삼로 10 4층 JINSYSTEM', phone: '064-722-0442' };
  function renderFooter() {
    const saved = localStorage.getItem('jinsystem_footer');
    const f = saved ? JSON.parse(saved) : DEFAULT_FOOTER;
    document.getElementById('footer-year').textContent = `© ${f.year} JINSYSTEM. All rights reserved.`;
    document.getElementById('footer-address').textContent = f.address;
    document.getElementById('footer-phone').textContent = f.phone;
  }
  renderFooter();
</script>

<div id="admin-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/40 backdrop-blur-sm hidden">
  <div class="bg-white rounded-xl shadow-2xl p-lg w-full max-w-sm mx-margin border border-outline-variant">
    <div class="flex items-center justify-between mb-md">
      <h3 class="font-headline-md text-headline-md text-primary">관리자 인증</h3>
      <button onclick="closeAdminModal()" class="text-on-surface-variant hover:text-primary transition-colors">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <p class="font-body-sm text-body-sm text-on-surface-variant mb-md">관리자 페이지에 접근하려면 비밀번호를 입력하세요.</p>
    <input
      id="admin-password"
      type="password"
      placeholder="비밀번호 입력"
      class="w-full border border-outline-variant rounded-lg px-sm py-sm font-body-sm text-body-sm text-on-surface focus:outline-none focus:border-secondary mb-xs"
      onkeydown="if(event.key==='Enter') checkPassword()"
    >
    <p id="admin-error" class="font-body-sm text-[12px] text-red-500 mb-sm hidden">비밀번호가 올바르지 않습니다.</p>
    <button onclick="checkPassword()" class="w-full bg-primary text-on-primary py-sm rounded-lg font-body-md text-body-md hover:opacity-90 transition-all active:scale-95 mt-xs">
      확인
    </button>
  </div>
</div>
<script>
  const ADMIN_PASSWORD = 'admin1234';

  function openAdminModal(e) {
    e.preventDefault();
    if (sessionStorage.getItem('jinsystem_admin') === 'true') {
      window.location.href = 'admin.html';
      return;
    }
    document.getElementById('admin-modal').classList.remove('hidden');
    document.getElementById('admin-password').value = '';
    document.getElementById('admin-error').classList.add('hidden');
    setTimeout(() => document.getElementById('admin-password').focus(), 100);
  }

  function closeAdminModal() {
    document.getElementById('admin-modal').classList.add('hidden');
  }

  function checkPassword() {
    const input = document.getElementById('admin-password').value;
    if (input === ADMIN_PASSWORD) {
      sessionStorage.setItem('jinsystem_admin', 'true');
      window.location.href = 'admin.html';
    } else {
      document.getElementById('admin-error').classList.remove('hidden');
      document.getElementById('admin-password').value = '';
      document.getElementById('admin-password').focus();
    }
  }

  document.getElementById('admin-modal').addEventListener('click', function(e) {
    if (e.target === this) closeAdminModal();
  });
</script>
